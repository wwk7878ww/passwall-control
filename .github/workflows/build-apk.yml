name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Patch Java text block escapes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("app/src/main/java/com/wangkai/passwallcontrol/MainActivity.java")
          s = p.read_text(encoding="utf-8")
          s = s.replace("location.pathname.replace(/\\/$/,''); var want=TARGET_PATH.replace(/\\/$/,'');",
                        "location.pathname.replace(/\\\\/$/,''); var want=TARGET_PATH.replace(/\\\\/$/,'');")
          s = s.replace("replace(/\\s/g,'')", "replace(/\\\\s/g,'')")
          p.write_text(s, encoding="utf-8")
          PY

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: passwall-control-debug-apk
          path: app/build/outputs/apk/debug/*.apk
